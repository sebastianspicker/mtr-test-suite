# Shared default hosts for both Bash and PowerShell suites.
#
# Format: one entry per line, key=hostname (no spaces around '=').
#   ipv4=<hostname>   -- target for IPv4 test types (ICMP4, TCP4, UDP4, ...)
#   ipv6=<hostname>   -- target for IPv6 test types (ICMP6, TCP6, UDP6, ...)
#
# CLI host overrides (--hosts4 / -HostsIPv4) take precedence over this file.
# If this file is missing or empty, built-in defaults are used.

ipv4=netcologne.de
ipv4=google.com
ipv4=wikipedia.org
ipv4=amazon.de

ipv6=netcologne.de
ipv6=google.com
ipv6=wikipedia.org
